# Common configuration - env-specific config is in application-local.properties
micronaut:
  application:
    name: raven-brain
  security:
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_GENERATOR_SIGNATURE_SECRET\:defaultRavenBrainJwtSignatureSecret}
        generator:
          access-token:
            expiration: 43200 # 12 hours (i.e. 8am to 8pm during comp days)
          refresh-token:
            secret: ${JWT_GENERATOR_SIGNATURE_SECRET\:defaultRavenBrainJwtSignatureSecret}
    enabled: true
  server:
    cors:
      enabled: true
      configurations:
        all:
          exposed-headers:
            - X-RavenBrain-Version
            - X-RavenBrain-Time
            - ETag
    port: 8888
  servlet:
    async-supported: false
    test-async-supported: false
    async-file-serving-enabled: false
flyway:
  datasources:
    default:
      enabled: true
datasources:
  default:
    db-type: mysql
raven-eye:
  team: 1310
  security:
    encryption-seed: ${ENCRYPTION_SEED:raven-brain-default-seed-change-me-in-production}
    superuser-password: ${SUPERUSER_PASSWORD:default_superuser_password_999}
    registration-secret: ${REGISTRATION_SECRET:default_registration_secret_123}
  nexus-api:
    key: ${NEXUS_KEY:}
    ttl-seconds: 20
  telemetry:
    agent-password: ${TELEMETRY_AGENT_PASSWORD:default_telemetry_password_change_me}
  frc-api:
    user: ${FRC_USER:frc_api_user_id}
    key: ${FRC_KEY:frc_api_user_key}
    ttl-seconds: 59
  tba-api:
    key: ${TBA_KEY:tba_api_key}
    base-url: https://www.thebluealliance.com/api/v3
    ttl-seconds: 59
    stale-threshold-minutes: 90
  # Unified sync-cadence block. All poll intervals and window bounds live here so
  # there is one place to tune the FRC <-> RavenBrain <-> RavenEye traffic pattern.
  # Values are consumed by:
  #   - @Scheduled(fixedDelay = "${raven-eye.sync.*}") on server-side background jobs
  #   - /api/config/client-sync endpoints that deliver cadences + window to RavenEye
  #   - TournamentService lead/tail window parameterization
  # The invariant stale-threshold-minutes >= 1.5 * cadence-minutes is validated at startup
  # (see raven-eye.tba-api.stale-threshold-minutes above).
  sync:
    # How often RavenBrain polls the FRC API for match scores (applied via @Scheduled).
    frc-scores-poll: "30s"
    # How often RavenBrain polls the FRC API for match schedules (applied via @Scheduled).
    frc-schedule-poll: "3m"
    # How often RavenBrain polls TBA for event/webcast data (applied via @Scheduled).
    tba-event-poll: "1h"
    # How often RavenBrain polls TBA for match-video data (applied via @Scheduled).
    tba-match-poll: "1h"
    # How often RavenEye polls RavenBrain during an active tournament window (milliseconds).
    # Delivered to the client via /api/config/client-sync.
    raveneye-poll-ms: 30000
    # Tournament-window "active" boundary. A tournament is considered active from
    # (starttime - lead) through (endtime + tail).
    tournament-window-lead-hours: 12
    tournament-window-tail-hours: 10
    # Report-body cache TTL on the client (days). Delivered via /api/config/client-sync.
    report-body-ttl-days: 60
    # Client skew-tolerance "last-good offset" max age, in hours. Matches the JWT access-token
    # lifetime so an offline-for-hours scout with a skewed device still has a correct offset
    # when their local JWT-expiration check runs.
    skew-offset-max-age-hours: 12
